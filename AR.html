<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR.js 自転 サンプル</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, doc, setDoc, getDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
      import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyB6sOyrSwjY7fZaPEGDvn0iormTPWhjQsY",
        authDomain: "ar-stamp-6d9ed.firebaseapp.com",
        projectId: "ar-stamp-6d9ed",
        storageBucket: "ar-stamp-6d9ed.firebasestorage.app",
        messagingSenderId: "238550666098",
        appId: "1:238550666098:web:8c161928290c093bf8abeb",
        measurementId: "G-44D1V7P76C"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app);

      signInAnonymously(auth).catch((error) => {
        console.error("ログインエラー:", error);
      });

      let uid = "";
      onAuthStateChanged(auth, (user) => {
        if (user) {
          uid = user.uid;
          console.log("ログイン完了！ ユーザーID:", uid);
        }
      });

      window.db = db;
      window.getUid = () => uid;
      window.activeMarkerId = null;

      const btn = document.getElementById('collect-btn');
      const markers = document.querySelectorAll('a-marker');

      markers.forEach((marker) => {
        marker.addEventListener('markerFound', () => {
          window.activeMarkerId = marker.id;
          btn.style.display = 'block';
        });

        marker.addEventListener('markerLost', () => {
          if (window.activeMarkerId === marker.id) {
            window.activeMarkerId = null;
          }
          btn.style.display = 'none';
        });
      });

      btn.onclick = async () => {
        const uid = window.getUid();
        const markerId = window.activeMarkerId;

        if (!uid) return alert("ログイン中です。少々お待ちください。");
        if (!markerId) return alert("マーカーを認識してください。");

        try {
          await setDoc(doc(db, "users", uid, "collections", markerId), {
            markerId: markerId,
            timestamp: new Date()
          });
          alert("コレクションに追加しました！");
          btn.style.display = 'none';
        } catch (e) {
          console.error("保存失敗:", e);
          alert("保存に失敗しました。");
        }
      };
    </script>

    <script>
      AFRAME.registerComponent('swipe-rotate', {
        schema: { speed: { default: 0.5 } },
        init: function () {
          this.touchStartX = 0;
          this.touchStartY = 0;
          this.isDragging = false;
          window.addEventListener('touchstart', (e) => {
            this.isDragging = true;
            this.touchStartX = e.touches[0].clientX;
            this.touchStartY = e.touches[0].clientY;
          });
          window.addEventListener('touchend', () => { this.isDragging = false; });
          window.addEventListener('touchmove', (e) => {
            if (!this.isDragging) return;
            const currentX = e.touches[0].clientX;
            const currentY = e.touches[0].clientY;
            const deltaX = currentX - this.touchStartX;
            const deltaY = currentY - this.touchStartY;
            const rotation = this.el.getAttribute('rotation');
            
            this.el.setAttribute('rotation', {
              x: rotation.x - deltaY * this.data.speed,
              y: rotation.y + deltaX * this.data.speed,
              z: rotation.z
            });
            
            this.touchStartX = currentX;
            this.touchStartY = currentY;
          });
        }
      });

      AFRAME.registerComponent('auto-center', {
        init: function () {
          this.el.addEventListener('model-loaded', () => {
            const mesh = this.el.getObject3D('mesh');
            if (!mesh) return;
            const clone = mesh.clone();
            clone.position.set(0, 0, 0);
            clone.rotation.set(0, 0, 0);
            clone.scale.set(1, 1, 1);
            clone.updateMatrixWorld(true);

            const box = new THREE.Box3().setFromObject(clone);
            const center = new THREE.Vector3();
            box.getCenter(center);

            this.el.setAttribute('position', {
              x: -center.x,
              y: -center.y,
              z: -center.z
            });
          });
        }
      });
    </script>

    <style>
      #collect-btn {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 15px 30px;
        background-color: #ff5722;
        color: white;
        border: none;
        border-radius: 25px;
        font-size: 18px;
        font-weight: bold;
        display: none;
        z-index: 1000;
      }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <button id="collect-btn">今のをゲットする！</button>
    <a href="collection.html" style="position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.5); color: white; padding: 10px; text-decoration: none; border-radius: 5px; z-index: 1000;">図鑑を見る</a>
    
    <a-scene embedded arjs renderer="colorManagement: true; exposure: 1.2;" gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.6/;">
      <a-assets timeout="1000">
        </a-assets>

      <a-entity light="type: ambient; color: #BBB; intensity: 1.5"></a-entity>
      <a-entity light="type: directional; color: #FFF; intensity: 0.8" position="-1 1 1"></a-entity>

      <a-marker type="pattern" url="markers/pattern-stanp1.patt" id="Protoceratops">
        <a-entity swipe-rotate>
          <a-entity rotation="0 0 0">
            <a-entity id="model-Protoceratops" scale="1 1 1" auto-center></a-entity>
          </a-entity>
        </a-entity>
      </a-marker>

      <a-marker type="pattern" url="markers/pattern-stanp2.patt" id="Ravjaa">
        <a-entity swipe-rotate>
          <a-entity rotation="0 0 0">
            <a-entity id="model-Ravjaa" scale="1 1 1" auto-center></a-entity>
          </a-entity>
        </a-entity>
      </a-marker>

      <a-marker type="pattern" url="markers/pattern-stanp4.patt" id="Zavacephale">
        <a-entity swipe-rotate>
          <a-entity rotation="0 0 0">
            <a-entity id="model-Zavacephale" scale="0.07 0.07 0.07" auto-center></a-entity>
          </a-entity>
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      (function(){
        // 非同期で1つずつモデルを順番に読み込むリスト
        const modelList = [
          { id: 'model-Protoceratops', src: 'models/プロトケラトプス/Protoceratops.glb' },
          { id: 'model-Ravjaa', src: 'models/ラウジャア/Ravjaa.glb' },
          { id: 'model-Zavacephale', src: 'models/サヴァケファレ/Zavacephale.glb' }
        ];

        function setReady(){
          try { localStorage.setItem('ar_camera_ready','1'); } catch(e) {}
        }
        function clearReady(){
          try { localStorage.removeItem('ar_camera_ready'); } catch(e) {}
        }
        function setModelsReady(){
          try { localStorage.setItem('ar_models_ready','1'); } catch(e) {}
        }
        function clearModelsReady(){
          try { localStorage.removeItem('ar_models_ready'); } catch(e) {}
        }

        function watchCamera(){
          var checkInterval = setInterval(function(){
            var v = document.querySelector('video');
            if(v){
              if(!v.paused && v.readyState > 2){ setReady(); }
              v.addEventListener('playing', setReady);
              v.addEventListener('loadeddata', function(){ if(!v.paused) setReady(); });
              clearInterval(checkInterval);
            }
          }, 300);
        }

        // カメラが起動した後に、重いモデルを1つずつ「非同期（バックグラウンド）」でロードする関数
        async function loadModelsSequentially() {
          const assets = document.querySelector('a-assets');
          if (!assets) return;

          for (let i = 0; i < modelList.length; i++) {
            const m = modelList[i];
            await new Promise((resolve) => {
              const item = document.createElement('a-asset-item');
              item.setAttribute('id', m.id + '-asset');
              item.setAttribute('src', m.src);
              
              // 読み込み完了、またはエラーが起きても次のモデルに進む
              item.addEventListener('loaded', () => {
                const entity = document.getElementById(m.id);
                if (entity) {
                  entity.setAttribute('gltf-model', '#' + m.id + '-asset');
                }
                resolve();
              });
              item.addEventListener('error', () => {
                console.error("モデルの読み込みに失敗しました: " + m.src);
                resolve();
              });
              
              assets.appendChild(item);
            });
          }
          // すべてのモデルの裏読み込み・配置が完了
          setModelsReady();
        }

        window.addEventListener('load', function(){
          watchCamera();
          // シーンが初期化されたら非同期ロードを開始する
          const scene = document.querySelector('a-scene');
          if (scene.hasLoaded) {
            loadModelsSequentially();
          } else {
            scene.addEventListener('loaded', loadModelsSequentially);
          }
        });

        window.addEventListener('beforeunload', function(){
          clearReady();
          clearModelsReady();
        });
      })();
    </script>
  </body>
</html>
