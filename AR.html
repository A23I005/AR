<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR体験 - 恐竜マーカー</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Firebaseの設定
        const firebaseConfig = {
            apiKey: "AIzaSyB6sOyrSwjY7fZaPEGDvn0iormTPWhjQsY",
            authDomain: "ar-stamp-6d9ed.firebaseapp.com",
            projectId: "ar-stamp-6d9ed",
            storageBucket: "ar-stamp-6d9ed.firebasestorage.app",
            messagingSenderId: "238550666098",
            appId: "1:238550666098:web:8c161928290c093bf8abeb",
            measurementId: "G-44D1V7P76C"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        signInAnonymously(auth).catch((error) => console.error("ログインエラー:", error));

        let uid = "";
        onAuthStateChanged(auth, (user) => {
            if (user) {
                uid = user.uid;
                console.log("Firebaseログイン完了:", uid);
            }
        });

        // ボタンのクリック処理
        const btn = document.getElementById('collect-btn');
        btn.onclick = async () => {
            const markerId = window.activeMarkerId;
            if (!uid) return alert("ログイン処理中です。少々お待ちください。");
            if (!markerId) return alert("マーカーを認識してください。");

            try {
                await setDoc(doc(db, "users", uid, "collections", markerId), {
                    markerId: markerId,
                    timestamp: new Date()
                });
                alert("コレクションに追加しました！");
                btn.style.display = 'none';
            } catch (e) {
                console.error("保存失敗:", e);
                alert("保存に失敗しました。");
            }
        };
    </script>

    <script>
        // A-Frame コンポーネント登録
        AFRAME.registerComponent('swipe-rotate', {
            schema: { speed: { default: 0.5 } },
            init: function () {
                this.touchStartX = 0; this.touchStartY = 0; this.isDragging = false;
                window.addEventListener('touchstart', (e) => {
                    this.isDragging = true;
                    this.touchStartX = e.touches[0].clientX;
                    this.touchStartY = e.touches[0].clientY;
                });
                window.addEventListener('touchend', () => { this.isDragging = false; });
                window.addEventListener('touchmove', (e) => {
                    if (!this.isDragging) return;
                    const currentX = e.touches[0].clientX;
                    const currentY = e.touches[0].clientY;
                    const deltaX = currentX - this.touchStartX;
                    const deltaY = currentY - this.touchStartY;
                    const rotation = this.el.getAttribute('rotation');
                    this.el.setAttribute('rotation', {
                        x: rotation.x - deltaY * this.data.speed,
                        y: rotation.y + deltaX * this.data.speed,
                        z: rotation.z
                    });
                    this.touchStartX = currentX; this.touchStartY = currentY;
                });
            }
        });

        AFRAME.registerComponent('auto-center', {
            init: function () {
                this.el.addEventListener('model-loaded', () => {
                    const mesh = this.el.getObject3D('mesh');
                    if (!mesh) return;
                    const clone = mesh.clone();
                    clone.position.set(0, 0, 0); clone.rotation.set(0, 0, 0); clone.scale.set(1, 1, 1);
                    clone.updateMatrixWorld(true);
                    const box = new THREE.Box3().setFromObject(clone);
                    const center = new THREE.Vector3();
                    box.getCenter(center);
                    this.el.setAttribute('position', { x: -center.x, y: -center.y, z: -center.z });
                });
            }
        });
    </script>

    <style>
        /* --- ローディング・案内画面のスタイル --- */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; font-family: sans-serif; transition: opacity 0.5s ease;
        }
        .container {
            text-align: center; background: white; border-radius: 20px;
            padding: 40px 30px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px; width: 90%;
        }
        h1 { color: #333; margin-bottom: 20px; font-size: 28px; }
        .description { color: #666; font-size: 16px; line-height: 1.6; margin-bottom: 30px; }
        .status-box { margin-bottom: 25px; padding: 15px; background: #f7f9fc; border-radius: 12px; }
        .status-item { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; font-size: 15px; color: #4a5568; }
        .spinner { width: 20px; height: 20px; border: 3px solid #e2e8f0; border-top: 3px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .ready-icon { color: #10b981; font-weight: bold; }
        
        #ar-button {
            background: #4f46e5; color: white; border: none; padding: 16px 32px;
            font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.4); width: 100%; display: none;
        }

        /* --- AR画面表示時のスタイル --- */
        #ar-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            visibility: hidden; z-index: 1;
        }
        #collect-btn {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; background-color: #ff5722; color: white; border: none;
            border-radius: 25px; font-size: 18px; font-weight: bold; display: none; z-index: 1000;
        }
        #to-collection-btn {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.6);
            color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; z-index: 1000; font-size: 14px;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="start-screen">
        <div class="container">
            <h1>恐竜ARラリー</h1>
            <p class="description">カメラと巨大な3Dモデルをバックグラウンドで安全に準備しています。完了までこのままお待ちください。</p>
            <div class="status-box">
                <div class="status-item">
                    <span>3D恐竜モデルの読込:</span>
                    <span id="models-status"><span class="spinner"></span></span>
                </div>
            </div>
            <button id="ar-button">✓ 準備完了！ARを開始する</button>
        </div>
    </div>

    <div id="ar-container">
        <button id="collect-btn">今のをゲットする！</button>
        <a id="to-collection-btn" href="collection.html">図鑑を見る</a>
        
        <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="colorManagement: true; exposure: 1.2;" gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.6/;">
            <a-assets>
                <a-asset-item id="Protoceratops-asset" src="models/プロトケラトプス/Protoceratops.glb"></a-asset-item>
                <a-asset-item id="Ravjaa-asset" src="models/ラウジャア/Ravjaa.glb"></a-asset-item>
                <a-asset-item id="Zavacephale-asset" src="models/サヴァケファレ/Zavacephale.glb"></a-asset-item>
            </a-assets>

            <a-entity light="type: ambient; color: #BBB; intensity: 1.5"></a-entity>
            <a-entity light="type: directional; color: #FFF; intensity: 0.8" position="-1 1 1"></a-entity>

            <a-marker type="pattern" url="markers/pattern-stanp1.patt" id="Protoceratops">
                <a-entity swipe-rotate><a-entity rotation="0 0 0">
                    <a-entity gltf-model="#Protoceratops-asset" scale="1 1 1" auto-center></a-entity>
                </a-entity></a-entity>
            </a-marker>

            <a-marker type="pattern" url="markers/pattern-stanp2.patt" id="Ravjaa">
                <a-entity swipe-rotate><a-entity rotation="0 0 0">
                    <a-entity gltf-model="#Ravjaa-asset" scale="1 1 1" auto-center></a-entity>
                </a-entity></a-entity>
            </a-marker>

            <a-marker type="pattern" url="markers/pattern-stanp4.patt" id="Zavacephale">
                <a-entity swipe-rotate><a-entity rotation="0 0 0">
                    <a-entity gltf-model="#Zavacephale-asset" scale="0.07 0.07 0.07" auto-center></a-center></a-entity>
                </a-entity></a-entity>
            </a-marker>

            <a-entity camera></a-entity>
        </a-scene>
    </div>

    <script>
        window.activeMarkerId = null;

        // マーカー検知のイベント登録
        const markers = document.querySelectorAll('a-marker');
        const collectBtn = document.getElementById('collect-btn');
        markers.forEach((marker) => {
            marker.addEventListener('markerFound', () => {
                window.activeMarkerId = marker.id;
                collectBtn.style.display = 'block';
            });
            marker.addEventListener('markerLost', () => {
                if (window.activeMarkerId === marker.id) window.activeMarkerId = null;
                collectBtn.style.display = 'none';
            });
        });

        // 3Dモデルの全ロード完了を監視
        const assets = document.querySelector('a-assets');
        const items = assets.querySelectorAll('a-asset-item');
        let loadedCount = 0;

        function checkAllAssetsLoaded() {
            loadedCount++;
            if (loadedCount >= items.length) {
                // すべてのモデルがメモリ上に完全展開されたらボタンを表示
                document.getElementById('models-status').innerHTML = '<span class="ready-icon">✓ 完了</span>';
                document.getElementById('ar-button').style.display = 'block';
            }
        }

        items.forEach((item) => {
            if (item.hasLoaded) {
                checkAllAssetsLoaded();
            } else {
                item.addEventListener('loaded', checkAllAssetsLoaded);
                item.addEventListener('error', checkAllAssetsLoaded); // エラー時もスタック防止で進める
            }
        });

        // 「ARを開始する」が押されたら一瞬でカメラ画面に切り替える
        document.getElementById('ar-button').addEventListener('click', () => {
            // 案内画面を消す
            const startScreen = document.getElementById('start-screen');
            startScreen.style.opacity = '0';
            setTimeout(() => startScreen.style.display = 'none', 500);

            // 隠していたARシーンを「一瞬」で可視化する（ロードは終わっているので即カメラが映ります）
            document.getElementById('ar-container').style.visibility = 'visible';
        });
    </script>
</body>
</html>
