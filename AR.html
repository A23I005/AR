<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>AR恐竜図鑑 カメラ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://unpkg.com/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB6sOyrSwjY7fZaPEGDvn0iormTPWhjQsY",
      authDomain: "ar-stamp-6d9ed.firebaseapp.com",
      projectId: "ar-stamp-6d9ed",
      storageBucket: "ar-stamp-6d9ed.firebasestorage.app",
      messagingSenderId: "238550666098",
      appId: "1:238550666098:web:8c161928290c093bf8abeb",
      measurementId: "G-44D1V7P76C"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let uid = "";

    signInAnonymously(auth).catch((error) => {
      console.error("ログインエラー:", error);
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        uid = user.uid;
        console.log("ログイン完了！ ユーザーID:", uid);
      }
    });

    window.db = db;
    window.getUid = () => uid;
    window.setDocRef = setDoc;
    window.docRef = doc;
  </script>

  <script>
    AFRAME.registerComponent('swipe-rotate', {
      schema: { speed: { default: 0.5 } },

      init: function () {
        this.touchStartX = 0;
        this.touchStartY = 0;
        this.isDragging = false;

        window.addEventListener('touchstart', (e) => {
          this.isDragging = true;
          this.touchStartX = e.touches[0].clientX;
          this.touchStartY = e.touches[0].clientY;
        });

        window.addEventListener('touchend', () => {
          this.isDragging = false;
        });

        window.addEventListener('touchmove', (e) => {
          if (!this.isDragging) return;

          const currentX = e.touches[0].clientX;
          const currentY = e.touches[0].clientY;
          const deltaX = currentX - this.touchStartX;
          const deltaY = currentY - this.touchStartY;
          const rotation = this.el.getAttribute('rotation');

          this.el.setAttribute('rotation', {
            x: rotation.x - deltaY * this.data.speed,
            y: rotation.y + deltaX * this.data.speed,
            z: rotation.z
          });

          this.touchStartX = currentX;
          this.touchStartY = currentY;
        });
      }
    });

    AFRAME.registerComponent('auto-center', {
      init: function () {
        this.el.addEventListener('model-loaded', () => {
          const mesh = this.el.getObject3D('mesh');
          if (!mesh) return;

          const clone = mesh.clone();
          clone.position.set(0, 0, 0);
          clone.rotation.set(0, 0, 0);
          clone.scale.set(1, 1, 1);
          clone.updateMatrixWorld(true);

          const box = new THREE.Box3().setFromObject(clone);
          const center = new THREE.Vector3();
          box.getCenter(center);

          this.el.setAttribute('position', {
            x: -center.x,
            y: -center.y,
            z: -center.z
          });
        });
      }
    });
  </script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: sans-serif;
    }

    #collect-btn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 30px;
      background-color: #ff5722;
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 18px;
      font-weight: bold;
      display: none;
      z-index: 1000;
    }

    #collection-link {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.5);
      color: white;
      padding: 10px;
      text-decoration: none;
      border-radius: 5px;
      z-index: 1000;
    }

    #back-link {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.5);
      color: white;
      padding: 10px;
      text-decoration: none;
      border-radius: 5px;
      z-index: 1000;
    }

    #model-loading-indicator {
      position: fixed;
      bottom: 85px;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 16px 20px;
      border-radius: 15px;
      display: none;
      z-index: 2000;
      font-size: 14px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <button id="collect-btn">今のをゲットする！</button>

  <a id="back-link" href="index.html">戻る</a>
  <a id="collection-link" href="collection.html">図鑑を見る</a>

  <div id="model-loading-indicator">モデルを表示中...</div>

  <a-scene
    embedded
    arjs
    renderer="colorManagement: true; exposure: 1.2;"
    gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.6/;"
  >
    <a-assets>
      <a-asset-item id="raujaa-glb" src="models/raujaa/raujaa.glb"></a-asset-item>
      <a-asset-item id="toriko-glb" src="models/torikosaurusu/base_basic_shaded.glb"></a-asset-item>
    </a-assets>

    <a-entity light="type: ambient; color: #BBB; intensity: 1.5"></a-entity>
    <a-entity light="type: directional; color: #FFF; intensity: 0.8" position="-1 1 1"></a-entity>

    <a-marker type="pattern" url="markers/pattern-stanp2.patt" id="raujaa">
      <a-entity swipe-rotate>
        <a-entity rotation="0 0 0">
          <a-entity
            gltf-model="#raujaa-glb"
            scale="0.4 0.4 0.4"
            auto-center>
          </a-entity>
        </a-entity>
      </a-entity>
    </a-marker>

    <a-marker type="pattern" url="markers/pattern-stanp.patt" id="toriko">
      <a-entity swipe-rotate>
        <a-entity rotation="0 0 0">
          <a-entity
            gltf-model="#toriko-glb"
            scale="0.4 0.4 0.4"
            auto-center>
          </a-entity>
        </a-entity>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    let currentMarkerId = "";

    const markerNames = {
      raujaa: "ラウジャア",
      toriko: "トリケラ"
    };

    function setupMarkerEvents() {
      const collectBtn = document.getElementById("collect-btn");
      const markers = document.querySelectorAll("a-marker");

      markers.forEach((marker) => {
        marker.addEventListener("markerFound", () => {
          currentMarkerId = marker.id;
          collectBtn.style.display = "block";
          console.log("マーカー認識:", marker.id);
        });

        marker.addEventListener("markerLost", () => {
          if (currentMarkerId === marker.id) {
            currentMarkerId = "";
          }

          collectBtn.style.display = "none";
          console.log("マーカー解除:", marker.id);
        });
      });
    }

    function setupModelLoadingEvents() {
      const indicator = document.getElementById("model-loading-indicator");

      const models = [
        {
          id: "raujaa",
          selector: '#raujaa [gltf-model]',
          name: "ラウジャア"
        },
        {
          id: "toriko",
          selector: '#toriko [gltf-model]',
          name: "トリケラ"
        }
      ];

      models.forEach((item) => {
        const modelEl = document.querySelector(item.selector);

        if (!modelEl) return;

        modelEl.addEventListener("model-loaded", () => {
          console.log(`${item.name} モデル読み込み完了`);
          indicator.style.display = "none";
        });

        modelEl.addEventListener("model-error", () => {
          console.error(`${item.name} モデル読み込み失敗`);
          indicator.innerText = `${item.name} の表示に失敗しました`;
          indicator.style.display = "block";

          setTimeout(() => {
            indicator.style.display = "none";
          }, 2000);
        });
      });
    }

    function setupCollectButton() {
      const collectBtn = document.getElementById("collect-btn");

      collectBtn.addEventListener("click", async () => {
        const uid = window.getUid();

        if (!uid) {
          alert("ログイン中です。少々お待ちください。");
          return;
        }

        if (!currentMarkerId) {
          alert("マーカーを読み取ってください。");
          return;
        }

        try {
          const db = window.db;
          const setDoc = window.setDocRef;
          const doc = window.docRef;

          await setDoc(doc(db, "users", uid, "collections", currentMarkerId), {
            markerId: currentMarkerId,
            timestamp: new Date()
          });

          const name = markerNames[currentMarkerId] || currentMarkerId;
          alert(`${name} をコレクションに追加しました！`);
          collectBtn.style.display = "none";
        } catch (e) {
          console.error("保存失敗:", e);
          alert("保存に失敗しました。");
        }
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      setupMarkerEvents();
      setupModelLoadingEvents();
      setupCollectButton();
    });
  </script>
</body>
</html>
