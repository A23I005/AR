<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR体験 - 恐竜マーカー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .description {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .status {
            margin-bottom: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-text {
            font-size: 16px;
            color: #999;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #ar-button {
            display: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            width: 100%;
            margin-bottom: 10px;
        }

        #ar-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        #ar-button:active {
            transform: translateY(0);
        }

        .ready-badge {
            display: inline-block;
            background: #4caf50;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin-top: 10px;
        }

        .info-text {
            font-size: 14px;
            color: #999;
            margin-top: 15px;
            line-height: 1.5;
        }

        /* 隠しiframe用 */
        #ar-iframe {
            display: none;
            width: 0;
            height: 0;
            border: none;
            position: fixed;
            bottom: -9999px;
            right: -9999px;
        }

        .error-text {
            color: #f44336;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🦕 AR恐竜図鑑 🦖</h1>
        
        <p class="description">
            マーカーをカメラで認識すると、恐竜がARで表示されます。<br>
            スムーズなカメラ起動をお待ちください...
        </p>

        <div class="status">
            <span class="status-text">
                <span class="spinner"></span>
                <span id="status-message">カメラを準備中...</span>
            </span>
        </div>

        <button id="ar-button">
            🎬 AR体験を開始
        </button>

        <p class="info-text">
            ※ カメラへのアクセスを許可してください。<br>
            ※ マーカーについては付属のマーカーを使用してください。
        </p>
    </div>

    <!-- バックグラウンドでAR.htmlを読み込んでカメラ準備状態を監視 -->
    <iframe id="ar-iframe" src="AR.html"></iframe>

    <script>
        const arButton = document.getElementById('ar-button');
        const statusMessage = document.getElementById('status-message');
        const arIframe = document.getElementById('ar-iframe');
        const container = document.querySelector('.container');

        let cameraReady = false;
        let modelsReady = false;
        let checkInterval = null;
        let setupTimeout = null;

        function checkARReady() {
            try {
                // AR.htmlのlocalStorageから状態を確認
                // iframe内のlocalStorageにアクセスするため、postMessageで通信する必要もあるが、
                // 同一オリジン＆同じドメイン上なら直接アクセス可能な場合もある
                // より安全な実装は下記に変更
                
                // フレーム内のwindowオブジェクトを確認
                if (arIframe.contentWindow) {
                    const storage = arIframe.contentWindow.localStorage;
                    cameraReady = storage.getItem('ar_camera_ready') === '1';
                    modelsReady = storage.getItem('ar_models_ready') === '1';
                }
            } catch (e) {
                // Cross-originエラーが発生した場合は、popupで代替実装
                console.log('iframe監視方法を切り替えます', e);
                switchToPopupMethod();
            }

            // ステータス更新
            updateStatus();

            // どちらも完了したらボタン表示
            if (cameraReady && modelsReady) {
                showButton();
                clearInterval(checkInterval);
            }
        }

        function updateStatus() {
            if (!cameraReady) {
                statusMessage.textContent = 'カメラを準備中...';
            } else if (!modelsReady) {
                statusMessage.textContent = 'モデルを読み込み中...';
            } else {
                statusMessage.textContent = 'すべての準備が完了しました！';
            }
        }

        function showButton() {
            arButton.style.display = 'block';
            statusMessage.innerHTML = '<span style="color: #4caf50;">✓ 準備完了！タップして開始</span>';
            
            // スピナーを非表示
            const spinner = document.querySelector('.spinner');
            if (spinner) spinner.style.display = 'none';

            // バッジを表示
            const badge = document.createElement('div');
            badge.className = 'ready-badge';
            badge.textContent = '✓ 準備完了';
            statusMessage.parentElement.appendChild(badge);
        }

        function switchToPopupMethod() {
            console.log('ポップアップ方式に切り替え');
            // iframeアプローチが失敗した場合、直接AR.htmlを開く準備
            clearInterval(checkInterval);
            statusMessage.textContent = 'セットアップ中...';
            
            // 簡単な準備完了検出: 3秒後に表示
            setTimeout(() => {
                showButton();
                statusMessage.innerHTML = '<span style="color: #4caf50;">✓ 準備完了！タップして開始</span>';
            }, 3000);
        }

        // ボタンクリック時の処理
        arButton.addEventListener('click', () => {
            // AR.htmlへ遷移
            window.location.href = 'AR.html';
        });

        // ページロード時に監視開始
        // 修正後（これに書き換える！）
		window.addEventListener('load', () => {
			// 古いキャッシュ情報を一旦クリアして誤作動を防ぐ
			try {
				localStorage.removeItem('ar_camera_ready');
				localStorage.removeItem('ar_models_ready');
			} catch(e) {}

			// 100msごとに状態確認
			checkInterval = setInterval(checkARReady, 100);

			// 重いモデルを考慮し、最大待機時間を10秒から「20秒」に伸ばしておく（タイムアウト保険）
			setupTimeout = setTimeout(() => {
				if (!cameraReady || !modelsReady) {
					console.warn('準備完了待機がタイムアウトしました。強制起動します。');
					showButton(); 
				}
				clearInterval(checkInterval);
			}, 20000);
		});

        // クリーンアップ
        window.addEventListener('beforeunload', () => {
            if (checkInterval) clearInterval(checkInterval);
            if (setupTimeout) clearTimeout(setupTimeout);
        });
    </script>
</body>
</html>
