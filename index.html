<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>AR恐竜図鑑</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f7f7f7;
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      width: 90%;
      max-width: 480px;
      background: white;
      padding: 32px 24px;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 30px;
    }

    p {
      line-height: 1.6;
      color: #666;
    }

    #status-text {
      margin-top: 24px;
      color: #ff5722;
      font-weight: bold;
    }

    .progress-wrap {
      width: 100%;
      height: 10px;
      background: #eee;
      border-radius: 999px;
      margin: 18px 0 24px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: #ff5722;
      transition: width 0.3s ease;
    }

    #start-ar-btn {
      padding: 15px 36px;
      font-size: 18px;
      background: #ff5722;
      color: white;
      border: none;
      border-radius: 999px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      max-width: 280px;
    }

    #start-ar-btn:disabled {
      background: #bbb;
      cursor: not-allowed;
    }

    .note {
      font-size: 12px;
      color: #999;
      margin-top: 16px;
    }

    .links {
      margin-top: 24px;
      font-size: 14px;
    }

    .links a {
      color: #333;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>AR恐竜図鑑</h1>

    <p>
      3Dモデルを読み込んでから<br>
      カメラを起動します。
    </p>

    <div id="status-text">3Dモデルを読み込み中...</div>

    <div class="progress-wrap">
      <div id="progress-bar"></div>
    </div>

    <button id="start-ar-btn" disabled>カメラを起動する</button>

    <p class="note">
      初回は少し時間がかかります。<br>
      Wi-Fi環境での利用をおすすめします。
    </p>

    <div class="links">
      <a href="collection.html">図鑑を見る</a>
    </div>
  </div>

  <script>
    const models = [
      {
        name: "ラウジャア",
        url: "models/raujaa/raujaa.glb"
      },
      {
        name: "トリケラ",
        url: "models/torikosaurusu/base_basic_shaded.glb"
      }
    ];

    const statusText = document.getElementById("status-text");
    const progressBar = document.getElementById("progress-bar");
    const startBtn = document.getElementById("start-ar-btn");

    async function preloadModels() {
      let loaded = 0;
      let failed = 0;

      startBtn.disabled = true;
      progressBar.style.width = "0%";

      for (const model of models) {
        try {
          statusText.innerText = `${model.name} を読み込み中... ${loaded + 1}/${models.length}`;

          const response = await fetch(model.url, { cache: "force-cache" });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const blob = await response.blob();

          console.log("事前読み込み完了:", model.url, blob.size);

          loaded++;
          progressBar.style.width = `${Math.round((loaded / models.length) * 100)}%`;
        } catch (error) {
          failed++;
          console.error("事前読み込み失敗:", model.url, error);
        }
      }

      if (failed > 0) {
        statusText.innerText = "一部モデルの読み込みに失敗しました。通信環境を確認してください。";
        startBtn.disabled = false;
        return;
      }

      statusText.innerText = "準備完了";
      startBtn.disabled = false;
    }

    startBtn.addEventListener("click", () => {
      location.href = "AR.html";
    });

    preloadModels();
  </script>
</body>
</html>
